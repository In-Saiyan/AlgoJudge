x-common-env: &common-env
  DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://redis:6379
  ENVIRONMENT: production
  STORAGE_BASE_PATH: /mnt/data

services:
  # ==========================================================================
  # Infrastructure Services
  # ==========================================================================

  postgres:
    image: postgres:16-alpine
    container_name: olympus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - olympus-network

  redis:
    image: redis:7-alpine
    container_name: olympus-redis
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - olympus-network

  # ==========================================================================
  # Application Services
  # ==========================================================================

  vanguard:
    build:
      context: .
      target: vanguard
    container_name: olympus-vanguard
    environment:
      <<: *common-env
      JWT_SECRET: ${JWT_SECRET}
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: vanguard=info,sqlx=warn
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - olympus_data:/mnt/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - olympus-network

  sisyphus:
    build:
      context: .
      target: sisyphus
    container_name: olympus-sisyphus
    environment:
      <<: *common-env
      WORKER_ID: ${SISYPHUS_WORKER_ID:-sisyphus_1}
      CONSUMER_GROUP: sisyphus_group
      COMPILE_STREAM: compile_queue
      NETWORK_ENABLED: ${NETWORK_ENABLED:-false}
      COMPILATION_TIMEOUT_SECS: ${COMPILATION_TIMEOUT_SECS:-30}
      DOCKER_API_VERSION: ${DOCKER_API_VERSION:-1.44}
      DOCKER_HOST_DATA_PATH: ${DOCKER_HOST_DATA_PATH:-}
      RUST_LOG: sisyphus=info,sqlx=warn
    volumes:
      - olympus_data:/mnt/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      vanguard:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - olympus-network

  minos:
    build:
      context: .
      target: minos
    container_name: olympus-minos
    environment:
      <<: *common-env
      WORKER_ID: ${MINOS_WORKER_ID:-minos_1}
      CONSUMER_GROUP: minos_group
      STREAM_NAME: run_queue
      DEFAULT_TIME_LIMIT_MS: ${DEFAULT_TIME_LIMIT_MS:-2000}
      DEFAULT_MEMORY_LIMIT_KB: ${DEFAULT_MEMORY_LIMIT_KB:-262144}
      RUST_LOG: minos=info,sqlx=warn
    volumes:
      - olympus_data:/mnt/data
    depends_on:
      vanguard:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - olympus-network

  horus:
    build:
      context: .
      target: horus
    container_name: olympus-horus
    environment:
      <<: *common-env
      TESTCASE_STALE_HOURS: ${TESTCASE_STALE_HOURS:-6}
      TEMP_ORPHAN_HOURS: ${TEMP_ORPHAN_HOURS:-1}
      SUBMISSION_RETENTION_DAYS: ${SUBMISSION_RETENTION_DAYS:-0}
      RUST_LOG: horus=info,sqlx=warn
    volumes:
      - olympus_data:/mnt/data
    depends_on:
      vanguard:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - olympus-network

networks:
  olympus-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  olympus_data:
